<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub issue Tracker | Home</title>
    <style type="text/tailwindcss">
      @theme {
        --font-geist: "Geist", sans-serif;
        --color-darkblue: #1f2937;
        --color-blue: #4a00ff;
      }

      .active {
        color: white;
        cursor: pointer;
        border-radius: 0.5rem; /* rounded-lg */
        background-color: rgba(59, 130, 246, 0.95); /* bg-blue/95 (approx) */
        padding: 1rem; /* p-4 */
        transition: all 0.2s ease;
      }

      .active:hover {
        background-color: rgb(59, 130, 246); /* hover:bg-blue */
      }

      .active:active {
        transform: scale(0.99); /* active:scale-99 */
      }
    </style>
  </head>
  <body>
    <div class="w-full bg-[#fafcf8] h-screen max-w-[1600px] font-geist">
      <section
        class="nav px-5 md:px-20 md:py-5 py-3 bg-white w-full drop-shadow-[0_5px_10px_rgba(0,0,0,0.08)]"
      >
        <nav class="flex justify-between items-center gap-10">
          <div class="logo flex gap-1 items-center">
            <img
              class="size-9"
              src="./assets/github-logo.png"
              alt="github-logo"
            />
            <p class="text-darkblue font-semibold text-2xl hidden sm:flex">
              GitHub Issues Tracker
            </p>
          </div>
          <div class="search flex gap-4">
            <div>
              <label class="input h-[44px]">
                <svg
                  class="h-[1em] opacity-50"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                  >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </g>
                </svg>
                <input
                  type="search"
                  class="grow placeholder:text-[#64748B]"
                  placeholder="Search"
              /></label>
            </div>
            <button
              class="text-white h-[44px] flex gap-1 justify-center items-center cursor-pointer rounded-lg bg-blue/95 active:scale-99 hover:bg-blue p-4"
            >
              <i class="fa-solid fa-plus"></i>
              <span class="hidden sm:block text-nowrap">New Issue</span>
            </button>
          </div>
        </nav>
      </section>
      <section
        class="w-full max-w-[1110px] bg-white p-3 md:p-6 flex gap-2 mt-8 mx-auto md:mt[60px] drop-shadow-[0_5px_10px_rgba(0,0,0,0.08)]"
      >
        <button id="all" class="btn text-center px-4 py-2 active">All</button>
        <button id="open" class="btn text-center px-4 py-2">open</button>
        <button id="closed" class="btn text-center px-4 py-2">closed</button>
      </section>
    </div>
    <script src="./script/main.js"></script>
  </body>
</html>
