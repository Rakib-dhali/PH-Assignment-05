<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub issue Tracker | Home</title>
    <style type="text/tailwindcss">
      @theme {
        --font-geist: "Geist", sans-serif;
        --color-darkblue: #1f2937;
        --color-blue: #4a00ff;
      }

      .active {
        color: white;
        cursor: pointer;
        border-radius: 0.3rem;
        background-color: rgba(59, 130, 246, 0.95);
        padding: 1rem; /* p-4 */
        transition: all 0.15s ease;
      }

      .active:hover {
        background-color: rgb(59, 130, 246);
      }

      .active:active {
        transform: scale(0.99);
      }
    </style>
  </head>
  <body>
    <div class="w-full bg-[#fafcf8] h-screen max-w-[1600px] font-geist">
      <section
        class="nav px-5 md:px-20 md:py-5 py-3 bg-white w-full drop-shadow-[0_5px_10px_rgba(0,0,0,0.08)]"
      >
        <nav class="flex justify-between items-center gap-10">
          <div class="logo flex gap-1 items-center">
            <img
              class="size-9"
              src="./assets/github-logo.png"
              alt="github-logo"
            />
            <p class="text-darkblue font-semibold text-2xl hidden sm:flex">
              GitHub Issues Tracker
            </p>
          </div>
          <div class="search flex gap-4">
            <div>
              <label class="input h-[44px]">
                <svg
                  class="h-[1em] opacity-50"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                  >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </g>
                </svg>
                <input
                  type="search"
                  class="grow placeholder:text-[#64748B]"
                  placeholder="Search"
              /></label>
            </div>
            <button
              class="text-white h-[44px] flex gap-1 justify-center items-center cursor-pointer rounded-lg bg-blue/95 active:scale-99 hover:bg-blue p-4"
            >
              <i class="fa-solid fa-plus"></i>
              <span class="hidden sm:block text-nowrap">New Issue</span>
            </button>
          </div>
        </nav>
      </section>
      <section
        class="w-full rounded-md max-w-[1110px] bg-white p-3 md:p-6 flex gap-2 mt-8 mx-auto md:mt[60px] drop-shadow-[0_5px_10px_rgba(0,0,0,0.08)]"
      >
        <button id="all" class="btn text-center px-4 py-2 active">All</button>
        <button id="open" class="btn text-center px-4 py-2">open</button>
        <button id="closed" class="btn text-center px-4 py-2">closed</button>
      </section>
      <section
        class="mt-4 bg-[#fbfbfb] max-w-[1110px] mx-auto rounded-md drop-shadow-[0_5px_10px_rgba(0,0,0,0.08)]"
      >
        <div
          class="top p-4 flex justify-between items-center md:p-6 max-w-[1110px] mx-auto rounded-t-md bg-white w-full border-b border-b-[#e4e4e7] mb-5"
        >
          <div class="left flex items-center gap-2">
            <img
              src="./assets/Aperture.png"
              alt="aperture-icon"
              class="sm:size-10 size-[35px] md:[50px]"
            />
            <div>
              <h1 class="text-xl font-semibold text-darkblue">
                <span id="issue-count">50</span> Issues
              </h1>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="right flex items-center gap-2">
            <div class="flex items-center justify-center gap-1">
              <div class="size-[15px] rounded-full bg-[#00A96E]"></div>
              <div class="text-darkblue">open</div>
            </div>
            <div class="flex items-center justify-center gap-1">
              <div class="size-[15px] rounded-full bg-[#A855F7]"></div>
              <div class="text-darkblue">closed</div>
            </div>
          </div>
        </div>
        <div class="middle">
          <div class="cards p-7">
            <div
              class="card drop-shadow-[0_5px_10px_rgba(0,0,0,0.08)] p-4 w-1/5 bg-white"
            >
              <div class="flex items-center justify-between mb-3">
                <img src="./assets/Open-Status.png" alt="" />
                <div
                  class="text-[#EF4444] bg-[#FEECEC] rounded-full px-6 py-1.5 leading-none font-medium text-xs"
                >
                  HIGH
                </div>
              </div>
              <h2 class="text-left text-sm font-semibold text-darkblue mb-2">
                Fix navigation menu on mobile devices
              </h2>
              <p class="text-left text-xs text-[#64748B] mb-3">
                The navigation menu doesn't collapse properly on mobile
                devices...
              </p>
              <div class="flex items-center justify-start gap-1 mb-4">
                <div
                  class="flex items-center justify-center gap-0.5 px-2 py-1 rounded-full bg-[#FEECEC] border border-[#FECACA]"
                >
                  <img src="./assets/bug.svg" alt="bug" />
                  <p class="font-medium text-[#EF4444] text-sm">BUGS</p>
                </div>
                <div
                  class="flex items-center justify-center gap-0.5 px-2 py-1 rounded-full bg-[#FEECEC] border border-[#FECACA]"
                >
                  <img src="./assets/bug.svg" alt="bug" />
                  <p class="font-medium text-[#EF4444] text-sm">BUGS</p>
                </div>

                <div></div>
              </div>
              <hr class="border-t border-neutral-300 mb-4" />
              <div class="text-sm text-[#64748B]">
                <p class="mb-2">author</p>
                <p>1/15/2024</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script src="./script/main.js"></script>
  </body>
</html>
